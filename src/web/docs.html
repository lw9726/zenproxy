<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZenProxy - API 文档</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root { --bg:#0f1117; --card:#1a1d27; --border:#2a2d3a; --primary:#6c63ff; --primary-hover:#5a52e0; --success:#22c55e; --danger:#ef4444; --warn:#f59e0b; --text:#e2e8f0; --text-dim:#94a3b8; --text-bright:#f8fafc; --code-bg:#0a0c10; }
body { font-family:'Segoe UI',system-ui,-apple-system,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
.header { background:var(--card); border-bottom:1px solid var(--border); padding:16px 24px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
.header h1 { font-size:20px; color:var(--text-bright); }
.header .nav { display:flex; align-items:center; gap:8px; }
.header .nav a { color:var(--text-dim); text-decoration:none; padding:6px 12px; border-radius:6px; transition:all .2s; }
.header .nav a:hover, .header .nav a.active { color:var(--primary); background:rgba(108,99,255,.1); }
.container { max-width:900px; margin:0 auto; padding:32px 24px 80px; }
/* Table of contents */
.toc { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:20px 24px; margin-bottom:32px; }
.toc-title { font-weight:600; color:var(--text-bright); margin-bottom:12px; font-size:15px; }
.toc a { color:var(--text-dim); text-decoration:none; display:block; padding:4px 0; font-size:14px; transition:color .2s; }
.toc a:hover { color:var(--primary); }
.toc .indent { padding-left:20px; }
/* Markdown rendered content */
.doc h1 { font-size:2em; font-weight:800; color:var(--primary); margin:0 0 16px; padding-bottom:12px; border-bottom:2px solid var(--border); }
.doc h2 { font-size:1.45em; font-weight:700; color:var(--text-bright); margin:48px 0 16px; padding-bottom:8px; border-bottom:1px solid var(--border); }
.doc h3 { font-size:1.15em; font-weight:600; color:var(--text-bright); margin:32px 0 12px; }
.doc h4 { font-size:1em; font-weight:600; color:var(--text-dim); margin:24px 0 8px; }
.doc p { margin:0 0 14px; line-height:1.75; }
.doc a { color:var(--primary); text-decoration:none; }
.doc a:hover { text-decoration:underline; }
.doc ul, .doc ol { margin:0 0 14px; padding-left:24px; }
.doc li { margin:4px 0; line-height:1.7; }
.doc strong { color:var(--text-bright); }
.doc hr { border:none; border-top:1px solid var(--border); margin:32px 0; }
.doc blockquote { border-left:3px solid var(--primary); background:rgba(108,99,255,.08); padding:12px 16px; margin:0 0 16px; border-radius:0 8px 8px 0; }
.doc blockquote p { margin:0; }
.doc code { background:var(--code-bg); border:1px solid var(--border); padding:2px 6px; border-radius:4px; font-size:0.88em; font-family:'JetBrains Mono','Fira Code','Consolas',monospace; }
.doc pre { background:var(--code-bg); border:1px solid var(--border); border-radius:8px; padding:16px 20px; margin:0 0 16px; overflow-x:auto; }
.doc pre code { background:none; border:none; padding:0; font-size:0.85em; line-height:1.65; }
.doc table { width:100%; border-collapse:collapse; margin:0 0 16px; font-size:0.9em; }
.doc th { background:var(--card); font-weight:600; text-align:left; padding:10px 12px; border:1px solid var(--border); color:var(--text-dim); font-size:12px; text-transform:uppercase; letter-spacing:.5px; }
.doc td { padding:8px 12px; border:1px solid var(--border); }
.doc tr:hover td { background:rgba(108,99,255,.03); }
/* Premium adaptive documentation theme */
:root {
  color-scheme: dark;
  --bg:#080b12; --surface:#0d1220; --card:#111827; --card-2:#151d2e; --border:#243044;
  --primary:#5b7cfa; --primary-hover:#4667dc; --primary-soft:rgba(91,124,250,.14);
  --text:#dbe4f0; --text-dim:#8ea0b8; --text-bright:#f7fafc; --code-bg:#070a10;
  --shadow:0 24px 70px rgba(0,0,0,.38); --ring:0 0 0 4px rgba(91,124,250,.16);
}
html[data-theme="light"] {
  color-scheme: light;
  --bg:#f5f7fb; --surface:#ffffff; --card:#ffffff; --card-2:#f9fbff; --border:#dce3ee;
  --primary:#315cf6; --primary-hover:#244bd2; --primary-soft:rgba(49,92,246,.10);
  --success:#07875a; --danger:#c9343a; --warn:#a66a00;
  --text:#243044; --text-dim:#64748b; --text-bright:#0f172a; --code-bg:#eef3fb;
  --shadow:0 22px 60px rgba(15,23,42,.10); --ring:0 0 0 4px rgba(49,92,246,.14);
}
body { background:radial-gradient(circle at top left, rgba(91,124,250,.22), transparent 34rem), linear-gradient(180deg, var(--bg), color-mix(in srgb, var(--bg), #000 7%)); line-height:1.5; }
.header { padding:14px 28px; background:color-mix(in srgb, var(--card), transparent 12%); backdrop-filter:blur(18px); box-shadow:0 1px 0 var(--border); }
.header h1 { letter-spacing:0; font-size:18px; display:flex; align-items:center; gap:10px; }
.header h1::before { content:""; width:30px; height:30px; border-radius:8px; background:linear-gradient(135deg, var(--primary), #16b8a6); box-shadow:0 10px 30px rgba(91,124,250,.28); }
.header .nav { gap:6px; flex-wrap:wrap; justify-content:flex-end; }
.header .nav a, .theme-toggle { min-height:36px; border-radius:8px; color:var(--text-dim); background:transparent; border:1px solid transparent; text-decoration:none; }
.header .nav a:hover, .header .nav a.active, .theme-toggle:hover { color:var(--text-bright); background:var(--primary-soft); border-color:color-mix(in srgb, var(--primary), transparent 72%); }
.theme-toggle { padding:6px 11px; font:inherit; cursor:pointer; }
.container { max-width:1040px; padding:34px 24px 90px; }
.toc, .doc pre, .doc table { background:linear-gradient(180deg, color-mix(in srgb, var(--card), #fff 2%), var(--card)); border-color:var(--border); box-shadow:var(--shadow); border-radius:8px; }
.toc { position:relative; overflow:hidden; }
.toc::before { content:""; position:absolute; inset:0 auto 0 0; width:4px; background:linear-gradient(var(--primary), #16b8a6); }
.doc h1 { color:var(--text-bright); font-size:2.3em; letter-spacing:0; }
.doc h2 { scroll-margin-top:90px; }
.doc h2, .doc h3 { letter-spacing:0; }
.doc code { background:var(--code-bg); border-color:var(--border); border-radius:6px; }
.doc blockquote { background:var(--primary-soft); border-left-color:var(--primary); }
.doc th { background:color-mix(in srgb, var(--card-2), transparent 12%); }
.doc tr:hover td { background:var(--primary-soft); }
@media (max-width:760px) {
  .header { align-items:flex-start; gap:12px; flex-direction:column; padding:14px 18px; }
  .header .nav { justify-content:flex-start; }
  .container { padding:22px 18px 70px; }
  .doc h1 { font-size:1.8em; }
}
</style>
</head>
<body>

<div class="header">
  <h1>ZenProxy</h1>
  <div class="nav">
    <a href="/">仪表盘</a>
    <a href="/admin">管理后台</a>
    <a href="/docs" class="active">API 文档</a>
    <button class="theme-toggle" type="button" onclick="toggleTheme()" aria-label="切换明暗主题" id="theme-toggle">Theme</button>
  </div>
</div>

<div class="container">
  <div id="toc" class="toc" style="display:none">
    <div class="toc-title">目录</div>
    <div id="toc-list"></div>
  </div>
  <div id="content" class="doc">{{CONTENT}}</div>
</div>

<script>
const THEME_KEY = 'zenproxy_theme';
function applyTheme(theme) {
  const resolved = theme || (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
  document.documentElement.dataset.theme = resolved;
  const btn = document.getElementById('theme-toggle');
  if (btn) btn.textContent = resolved === 'light' ? '深色' : '浅色';
}
function toggleTheme() {
  const next = document.documentElement.dataset.theme === 'light' ? 'dark' : 'light';
  localStorage.setItem(THEME_KEY, next);
  applyTheme(next);
}
applyTheme(localStorage.getItem(THEME_KEY));

// Generate table of contents from rendered headings
const headings = document.querySelectorAll('#content h2, #content h3');
if (headings.length > 0) {
  const tocList = document.getElementById('toc-list');
  headings.forEach((h, i) => {
    const id = 'sec-' + i;
    h.id = id;
    const a = document.createElement('a');
    a.href = '#' + id;
    a.textContent = h.textContent;
    if (h.tagName === 'H3') a.className = 'indent';
    tocList.appendChild(a);
  });
  document.getElementById('toc').style.display = '';
}
</script>
</body>
</html>
