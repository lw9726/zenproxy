<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZenProxy 管理后台</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root { --bg:#0f1117; --card:#1a1d27; --border:#2a2d3a; --primary:#6c63ff; --primary-hover:#5a52e0; --success:#22c55e; --danger:#ef4444; --warn:#f59e0b; --text:#e2e8f0; --text-dim:#94a3b8; --text-bright:#f8fafc; }
body { font-family:'Segoe UI',system-ui,-apple-system,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
.header { background:var(--card); border-bottom:1px solid var(--border); padding:16px 24px; display:flex; align-items:center; justify-content:space-between; }
.header h1 { font-size:20px; color:var(--text-bright); }
.header .nav a { color:var(--text-dim); text-decoration:none; margin-left:16px; padding:6px 12px; border-radius:6px; transition:all .2s; }
.header .nav a:hover, .header .nav a.active { color:var(--primary); background:rgba(108,99,255,.1); }
.container { max-width:1400px; margin:0 auto; padding:24px; }
.section { margin-bottom:32px; }
.section-title { font-size:16px; font-weight:600; color:var(--text-bright); margin-bottom:16px; display:flex; align-items:center; justify-content:space-between; }
.card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:20px; overflow-x:auto; }
.grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
@media(max-width:768px) { .grid-2 { grid-template-columns:1fr; } }
.form-group { margin-bottom:14px; }
.form-group label { display:block; font-size:13px; color:var(--text-dim); margin-bottom:6px; }
.form-group input, .form-group select, .form-group textarea { width:100%; padding:10px 12px; background:#0f1117; border:1px solid var(--border); border-radius:8px; color:var(--text); font-size:14px; outline:none; transition:border .2s; }
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color:var(--primary); }
.form-group textarea { resize:vertical; min-height:80px; }
.btn { padding:10px 20px; border:none; border-radius:8px; font-size:14px; font-weight:500; cursor:pointer; transition:all .2s; display:inline-flex; align-items:center; gap:6px; }
.btn-primary { background:var(--primary); color:#fff; }
.btn-primary:hover { background:var(--primary-hover); }
.btn-danger { background:var(--danger); color:#fff; }
.btn-danger:hover { opacity:.85; }
.btn-warn { background:var(--warn); color:#000; }
.btn-warn:hover { opacity:.85; }
.btn-success { background:var(--success); color:#fff; }
.btn-success:hover { opacity:.85; }
.btn-sm { padding:6px 12px; font-size:12px; }
.btn-group { display:flex; gap:8px; flex-wrap:wrap; }
table { width:100%; border-collapse:collapse; }
th, td { text-align:left; padding:10px 12px; border-bottom:1px solid var(--border); font-size:13px; white-space:nowrap; }
th { color:var(--text-dim); font-weight:500; font-size:12px; text-transform:uppercase; letter-spacing:.5px; cursor:pointer; user-select:none; }
th:hover { color:var(--text); }
th.sorted-asc::after { content:' ↑'; }
th.sorted-desc::after { content:' ↓'; }
tr:hover td { background:rgba(108,99,255,.03); }
.badge { display:inline-block; padding:3px 8px; border-radius:999px; font-size:11px; font-weight:600; }
.badge-valid { background:rgba(34,197,94,.15); color:var(--success); }
.badge-invalid { background:rgba(239,68,68,.15); color:var(--danger); }
.badge-untested { background:rgba(245,158,11,.15); color:var(--warn); }
.badge-type { background:rgba(108,99,255,.15); color:var(--primary); }
.badge-quality { background:rgba(245,158,11,.15); color:var(--warn); }
.badge-risk-low { background:rgba(34,197,94,.15); color:var(--success); }
.badge-risk-med { background:rgba(245,158,11,.15); color:var(--warn); }
.badge-risk-high { background:rgba(239,68,68,.15); color:var(--danger); }
.badge-banned { background:rgba(239,68,68,.15); color:var(--danger); }
.badge-active { background:rgba(34,197,94,.15); color:var(--success); }
.stat-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:12px; margin-bottom:24px; }
.stat-card { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:16px; text-align:center; }
.stat-value { font-size:28px; font-weight:700; color:var(--text-bright); }
.stat-label { font-size:12px; color:var(--text-dim); margin-top:4px; }
.toast { position:fixed; bottom:24px; right:24px; background:var(--card); border:1px solid var(--border); border-radius:10px; padding:12px 20px; font-size:14px; z-index:999; animation:slideIn .3s ease; }
@keyframes slideIn { from { transform:translateY(20px); opacity:0; } to { transform:translateY(0); opacity:1; } }
.filter-bar { display:flex; gap:12px; margin-bottom:16px; flex-wrap:wrap; align-items:center; }
.filter-bar input, .filter-bar select { padding:8px 12px; background:#0f1117; border:1px solid var(--border); border-radius:8px; color:var(--text); font-size:13px; outline:none; }
.filter-bar input:focus, .filter-bar select:focus { border-color:var(--primary); }
.empty { text-align:center; color:var(--text-dim); padding:40px; }
.type-chips { display:flex; gap:8px; flex-wrap:wrap; }
.type-chip { padding:4px 10px; border-radius:6px; font-size:12px; background:rgba(108,99,255,.1); color:var(--primary); }
.checkbox-group { display:flex; gap:16px; flex-wrap:wrap; }
.checkbox-group label { display:flex; align-items:center; gap:7px; font-size:13px; color:var(--text-dim); cursor:pointer; }
.checkbox-group input { accent-color:var(--primary); }
/* Login overlay */
.login-overlay { position:fixed; inset:0; background:var(--bg); display:flex; align-items:center; justify-content:center; z-index:1000; }
.login-box { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:40px; width:360px; text-align:center; }
.login-box h2 { font-size:22px; color:var(--text-bright); margin-bottom:8px; }
.login-box p { font-size:13px; color:var(--text-dim); margin-bottom:24px; }
.login-box input { width:100%; padding:12px 16px; background:#0f1117; border:1px solid var(--border); border-radius:8px; color:var(--text); font-size:14px; outline:none; margin-bottom:16px; }
.login-box input:focus { border-color:var(--primary); }
.login-box .btn { width:100%; justify-content:center; }
.login-error { color:var(--danger); font-size:13px; margin-bottom:12px; display:none; }
.api-key-cell { max-width:120px; overflow:hidden; text-overflow:ellipsis; font-family:'Consolas','Courier New',monospace; font-size:11px; }
.pagination { display:flex; align-items:center; justify-content:center; gap:4px; padding:16px 0 0; flex-wrap:wrap; }
.pagination button { background:transparent; border:1px solid var(--border); color:var(--text-dim); border-radius:6px; padding:6px 12px; font-size:13px; cursor:pointer; transition:all .2s; }
.pagination button:hover { border-color:var(--primary); color:var(--primary); }
.pagination button.active { background:var(--primary); border-color:var(--primary); color:#fff; }
.pagination button:disabled { opacity:.4; cursor:default; }
.pagination .page-info { font-size:13px; color:var(--text-dim); margin:0 8px; }
/* Premium adaptive theme */
:root {
  color-scheme: dark;
  --bg:#080b12; --surface:#0d1220; --card:#111827; --card-2:#151d2e; --border:#243044;
  --primary:#5b7cfa; --primary-hover:#4667dc; --primary-soft:rgba(91,124,250,.14);
  --text:#dbe4f0; --text-dim:#8ea0b8; --text-bright:#f7fafc; --code-bg:#070a10;
  --shadow:0 24px 70px rgba(0,0,0,.38); --ring:0 0 0 4px rgba(91,124,250,.16);
}
html[data-theme="light"] {
  color-scheme: light;
  --bg:#f5f7fb; --surface:#ffffff; --card:#ffffff; --card-2:#f9fbff; --border:#dce3ee;
  --primary:#315cf6; --primary-hover:#244bd2; --primary-soft:rgba(49,92,246,.10);
  --success:#07875a; --danger:#c9343a; --warn:#a66a00;
  --text:#243044; --text-dim:#64748b; --text-bright:#0f172a; --code-bg:#eef3fb;
  --shadow:0 22px 60px rgba(15,23,42,.10); --ring:0 0 0 4px rgba(49,92,246,.14);
}
body { background:radial-gradient(circle at top left, rgba(91,124,250,.22), transparent 34rem), linear-gradient(180deg, var(--bg), color-mix(in srgb, var(--bg), #000 7%)); line-height:1.5; }
.header { position:sticky; top:0; z-index:50; padding:14px 28px; background:color-mix(in srgb, var(--card), transparent 12%); backdrop-filter:blur(18px); box-shadow:0 1px 0 var(--border); }
.header h1 { letter-spacing:0; font-size:18px; display:flex; align-items:center; gap:10px; }
.header h1::before { content:""; width:30px; height:30px; border-radius:8px; background:linear-gradient(135deg, var(--primary), #16b8a6); box-shadow:0 10px 30px rgba(91,124,250,.28); }
.header .nav { display:flex; align-items:center; gap:6px; flex-wrap:wrap; justify-content:flex-end; }
.header .nav a, .theme-toggle { min-height:36px; margin-left:0; border-radius:8px; color:var(--text-dim); background:transparent; border:1px solid transparent; text-decoration:none; }
.header .nav a:hover, .header .nav a.active, .theme-toggle:hover { color:var(--text-bright); background:var(--primary-soft); border-color:color-mix(in srgb, var(--primary), transparent 72%); }
.theme-toggle { padding:6px 11px; font:inherit; cursor:pointer; }
.container { max-width:1480px; padding:28px; }
.section { margin-bottom:28px; }
.section-title { font-size:15px; letter-spacing:0; }
.card, .stat-card, .login-box { background:linear-gradient(180deg, color-mix(in srgb, var(--card), #fff 2%), var(--card)); border-color:var(--border); box-shadow:var(--shadow); border-radius:8px; }
.card { padding:18px; }
.stat-grid { grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:14px; }
.stat-card { text-align:left; padding:18px; position:relative; overflow:hidden; }
.stat-card::after { content:""; position:absolute; inset:auto 14px 14px auto; width:34px; height:3px; border-radius:999px; background:var(--primary); opacity:.75; }
.stat-value { font-size:30px; letter-spacing:0; }
.stat-label { text-transform:uppercase; letter-spacing:.06em; }
.btn { border-radius:8px; min-height:38px; box-shadow:none; }
.btn-primary { background:linear-gradient(135deg, var(--primary), #16a3b8); }
.btn-primary:hover { transform:translateY(-1px); box-shadow:0 12px 28px rgba(49,92,246,.24); }
.form-group input, .form-group select, .form-group textarea, .filter-bar input, .filter-bar select, .login-box input { background:var(--surface); border-color:var(--border); color:var(--text); border-radius:8px; }
.form-group input:focus, .form-group select:focus, .form-group textarea:focus, .filter-bar input:focus, .filter-bar select:focus, .login-box input:focus { border-color:var(--primary); box-shadow:var(--ring); }
table { border-collapse:separate; border-spacing:0; }
th { background:color-mix(in srgb, var(--card-2), transparent 12%); letter-spacing:.06em; }
th:first-child { border-top-left-radius:8px; }
th:last-child { border-top-right-radius:8px; }
td, th { border-bottom:1px solid var(--border); }
tr:hover td { background:var(--primary-soft); }
.badge, .type-chip { border-radius:6px; }
.login-overlay { background:radial-gradient(circle at 50% 0%, rgba(91,124,250,.22), transparent 34rem), var(--bg); }
.login-box { width:min(420px, calc(100vw - 32px)); padding:38px; }
.login-box h2 { font-size:28px; }
@media (max-width:760px) {
  .header { align-items:flex-start; gap:12px; flex-direction:column; padding:14px 18px; }
  .header .nav { justify-content:flex-start; }
  .container { padding:18px; }
}
</style>
</head>
<body>

<!-- Login Screen -->
<div class="login-overlay" id="login-overlay">
  <div class="login-box">
    <h2>ZenProxy 管理后台</h2>
    <p>请输入管理员密码以继续</p>
    <div class="login-error" id="login-error">密码错误，请重试</div>
    <input type="password" id="login-password" placeholder="输入密码..." onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn btn-primary" onclick="doLogin()">登录</button>
  </div>
</div>

<!-- Main App -->
<div id="app" style="display:none">
<div class="header">
  <h1>ZenProxy 管理后台</h1>
  <div class="nav">
    <a href="/">仪表盘</a>
    <a href="/admin" class="active">管理后台</a>
    <a href="/docs">API 文档</a>
    <button class="theme-toggle" type="button" onclick="toggleTheme()" aria-label="切换明暗主题" id="theme-toggle">Theme</button>
    <a href="javascript:void(0)" onclick="doLogout()" style="color:var(--danger)">退出登录</a>
  </div>
</div>

<div class="container">
  <!-- Stats -->
  <div class="stat-grid" id="stats">
    <div class="stat-card"><div class="stat-value" id="s-total">-</div><div class="stat-label">总代理数</div></div>
    <div class="stat-card"><div class="stat-value" id="s-valid">-</div><div class="stat-label">有效</div></div>
    <div class="stat-card"><div class="stat-value" id="s-invalid">-</div><div class="stat-label">无效</div></div>
    <div class="stat-card"><div class="stat-value" id="s-untested">-</div><div class="stat-label">待检测</div></div>
    <div class="stat-card"><div class="stat-value" id="s-subs">-</div><div class="stat-label">订阅源</div></div>
    <div class="stat-card"><div class="stat-value" id="s-quality">-</div><div class="stat-label">已质检</div></div>
    <div class="stat-card"><div class="stat-value" id="s-chatgpt">-</div><div class="stat-label">ChatGPT</div></div>
    <div class="stat-card"><div class="stat-value" id="s-google">-</div><div class="stat-label">Google</div></div>
    <div class="stat-card"><div class="stat-value" id="s-residential">-</div><div class="stat-label">住宅IP</div></div>
    <div class="stat-card"><div class="stat-value" id="s-users">-</div><div class="stat-label">注册用户</div></div>
  </div>

  <!-- Type breakdown -->
  <div class="section">
    <div class="section-title">类型分布</div>
    <div class="type-chips" id="type-chips"></div>
  </div>

  <!-- Actions -->
  <div class="section">
    <div class="section-title">操作</div>
    <div class="btn-group">
      <button class="btn btn-primary" onclick="triggerValidation()">验证全部代理</button>
      <button class="btn btn-primary" onclick="triggerQualityCheck()">全部质量检测</button>
      <button class="btn btn-danger" onclick="cleanupProxies()">清理高错误代理</button>
      <button class="btn btn-danger" onclick="cleanupUselessProxies()">删除三不通代理</button>
    </div>
  </div>

  <!-- Auth Settings -->
  <div class="section">
    <div class="section-title">认证系统</div>
    <div class="card">
      <div class="checkbox-group" style="margin-bottom:16px">
        <label><input type="checkbox" id="auth-account-login"> 允许账号登录</label>
        <label><input type="checkbox" id="auth-linux-login"> 允许 Linux.do 登录</label>
        <label><input type="checkbox" id="auth-registration"> 允许用户自行注册</label>
        <label><input type="checkbox" id="auth-new-users"> 允许新增用户</label>
      </div>
      <div class="btn-group">
        <button class="btn btn-primary" onclick="saveAuthSettings()">保存认证策略</button>
      </div>
    </div>
  </div>

  <!-- Create Account -->
  <div class="section">
    <div class="section-title">添加账号</div>
    <div class="card">
      <div class="grid-2">
        <div class="form-group">
          <label>用户名</label>
          <input id="new-user-username" placeholder="user_name">
        </div>
        <div class="form-group">
          <label>显示名称</label>
          <input id="new-user-name" placeholder="可选">
        </div>
        <div class="form-group">
          <label>初始密码</label>
          <input id="new-user-password" type="password" placeholder="至少 8 位">
        </div>
        <div class="form-group">
          <label>权限</label>
          <label style="display:flex;align-items:center;gap:8px;margin-top:10px;color:var(--text-dim)">
            <input type="checkbox" id="new-user-relay" style="width:auto;accent-color:var(--primary)">
            允许使用中转端点
          </label>
        </div>
      </div>
      <button class="btn btn-primary" onclick="createAccountUser()">创建账号</button>
    </div>
  </div>

  <!-- User Management -->
  <div class="section">
    <div class="section-title">用户管理 <span id="user-count" style="font-weight:400;font-size:13px;color:var(--text-dim)"></span></div>
    <div class="card">
      <table>
        <thead><tr><th>ID</th><th>用户名</th><th>昵称</th><th>信任等级</th><th>状态</th><th>中转</th><th>API Key</th><th>注册时间</th><th>操作</th></tr></thead>
        <tbody id="user-table"></tbody>
      </table>
      <div class="empty" id="user-empty">暂无注册用户</div>
    </div>
  </div>

  <!-- Add Subscription -->
  <div class="section">
    <div class="section-title">添加订阅</div>
    <div class="card">
      <div class="grid-2">
        <div>
          <div class="form-group">
            <label>名称</label>
            <input id="add-sub-name" placeholder="我的代理列表">
          </div>
          <div class="form-group">
            <label>类型</label>
            <select id="add-sub-type">
              <option value="auto">自动检测</option>
              <option value="v2ray">V2Ray URI</option>
              <option value="clash">Clash YAML</option>
              <option value="base64">Base64</option>
              <option value="socks5">SOCKS5 (纯文本)</option>
              <option value="socks4">SOCKS4 (纯文本)</option>
              <option value="http">HTTP (纯文本)</option>
              <option value="https">HTTPS (纯文本)</option>
            </select>
          </div>
        </div>
        <div>
          <div class="form-group">
            <label>订阅 URL</label>
            <input id="add-sub-url" placeholder="https://...">
          </div>
          <div class="form-group">
            <label>或粘贴内容</label>
            <textarea id="add-sub-content" placeholder="在此粘贴订阅内容...&#10;SOCKS5/HTTP 纯文本格式: 每行一个 host:port 或 user:pass@host:port"></textarea>
          </div>
        </div>
      </div>
      <button class="btn btn-primary" onclick="adminAddSubscription()">添加订阅</button>
    </div>
  </div>

  <!-- Subscriptions -->
  <div class="section">
    <div class="section-title">订阅源</div>
    <div class="card">
      <table>
        <thead><tr><th>名称</th><th>类型</th><th>URL</th><th>代理数</th><th>创建时间</th><th>操作</th></tr></thead>
        <tbody id="sub-table"></tbody>
      </table>
      <div class="empty" id="sub-empty">暂无订阅源</div>
    </div>
  </div>

  <!-- Proxy Table -->
  <div class="section">
    <div class="section-title">
      <span>全部代理 <span id="proxy-count"></span></span>
    </div>
    <div class="filter-bar">
      <input id="f-search" placeholder="搜索名称/服务器..." oninput="applyProxyFilters()">
      <select id="f-status" onchange="applyProxyFilters()">
        <option value="">全部状态</option>
        <option value="valid">有效</option>
        <option value="invalid">无效</option>
        <option value="untested">待检测</option>
      </select>
      <select id="f-type" onchange="applyProxyFilters()">
        <option value="">全部类型</option>
        <option value="vmess">VMess</option>
        <option value="vless">VLESS</option>
        <option value="trojan">Trojan</option>
        <option value="shadowsocks">Shadowsocks</option>
        <option value="hysteria2">Hysteria2</option>
      </select>
      <select id="f-quality" onchange="applyProxyFilters()">
        <option value="">全部质量</option>
        <option value="chatgpt">ChatGPT 可用</option>
        <option value="google">Google 可用</option>
        <option value="residential">Residential</option>
      </select>
    </div>
    <div class="card">
      <table>
        <thead><tr>
          <th onclick="sortBy('name')">名称</th>
          <th onclick="sortBy('type')">类型</th>
          <th onclick="sortBy('server')">服务器</th>
          <th onclick="sortBy('is_valid')">状态</th>
          <th onclick="sortBy('error_count')">错误数</th>
          <th>端口</th>
          <th>IP</th>
          <th onclick="sortBy('country')">国家</th>
          <th>IP类型</th>
          <th onclick="sortBy('risk')">风险</th>
          <th>ChatGPT</th>
          <th>Google</th>
          <th>住宅</th>
          <th>操作</th>
        </tr></thead>
        <tbody id="proxy-table"></tbody>
      </table>
      <div class="empty" id="proxy-empty">暂无代理</div>
      <div class="pagination" id="proxy-pagination"></div>
    </div>
  </div>
</div>
</div>

<script>
const THEME_KEY = 'zenproxy_theme';
function applyTheme(theme) {
  const resolved = theme || (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
  document.documentElement.dataset.theme = resolved;
  const btn = document.getElementById('theme-toggle');
  if (btn) btn.textContent = resolved === 'light' ? '深色' : '浅色';
}
function toggleTheme() {
  const next = document.documentElement.dataset.theme === 'light' ? 'dark' : 'light';
  localStorage.setItem(THEME_KEY, next);
  applyTheme(next);
}
applyTheme(localStorage.getItem(THEME_KEY));

let allProxies = [];
let proxyTotal = 0;
let sortField = 'name';
let sortDir = 'asc';
let currentPage = 1;
const pageSize = 50;
let filterTimer = null;

// --- Auth ---
const STORAGE_KEY = 'zenproxy_admin_password';

function getPassword() { return localStorage.getItem(STORAGE_KEY) || ''; }

function authHeaders() { return { 'Authorization': 'Bearer ' + getPassword() }; }

async function doLogin() {
  const pwd = document.getElementById('login-password').value;
  if (!pwd) return;
  try {
    const r = await fetch('/api/admin/stats', { headers: { 'Authorization': 'Bearer ' + pwd } });
    if (r.status === 401) {
      document.getElementById('login-error').style.display = 'block';
      return;
    }
    localStorage.setItem(STORAGE_KEY, pwd);
    document.getElementById('login-overlay').style.display = 'none';
    document.getElementById('app').style.display = '';
    refresh();
  } catch(e) {
    document.getElementById('login-error').style.display = 'block';
  }
}

function doLogout() {
  localStorage.removeItem(STORAGE_KEY);
  location.reload();
}

function checkAuth() {
  const pwd = getPassword();
  if (pwd) {
    fetch('/api/admin/stats', { headers: { 'Authorization': 'Bearer ' + pwd } }).then(r => {
      if (r.status === 401) {
        localStorage.removeItem(STORAGE_KEY);
        document.getElementById('login-overlay').style.display = '';
        document.getElementById('app').style.display = 'none';
      } else {
        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('app').style.display = '';
        refresh();
      }
    }).catch(() => {
      document.getElementById('login-overlay').style.display = '';
      document.getElementById('app').style.display = 'none';
    });
  }
}

// --- API helper ---
async function api(path, opts={}) {
  try {
    opts.headers = { ...authHeaders(), ...(opts.headers||{}) };
    const r = await fetch(path, opts);
    if (r.status === 401) {
      localStorage.removeItem(STORAGE_KEY);
      location.reload();
      return null;
    }
    return await r.json();
  }
  catch(e) { toast('错误: '+e.message); return null; }
}

function toast(msg) {
  const t = document.createElement('div');
  t.className='toast'; t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),3000);
}

function esc(s) { if(!s) return ''; const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

async function loadStats() {
  const d = await api('/api/admin/stats');
  if(!d) return;
  document.getElementById('s-total').textContent = d.total_proxies??0;
  document.getElementById('s-valid').textContent = d.valid_proxies??0;
  document.getElementById('s-invalid').textContent = d.invalid_proxies??0;
  document.getElementById('s-untested').textContent = d.untested_proxies??0;
  document.getElementById('s-subs').textContent = d.subscriptions??0;
  document.getElementById('s-quality').textContent = d.quality_checked??0;
  document.getElementById('s-chatgpt').textContent = d.chatgpt_accessible??0;
  document.getElementById('s-google').textContent = d.google_accessible??0;
  document.getElementById('s-residential').textContent = d.residential??0;
  const tc = document.getElementById('type-chips');
  if(d.by_type) {
    tc.innerHTML = Object.entries(d.by_type).map(([k,v])=>`<span class="type-chip">${esc(k)}: ${v}</span>`).join('');
  }
}

async function loadAuthSettings() {
  const d = await api('/api/admin/auth-settings');
  if(!d) return;
  document.getElementById('auth-account-login').checked = !!d.allow_account_login;
  document.getElementById('auth-linux-login').checked = !!d.allow_linux_do_login;
  document.getElementById('auth-registration').checked = !!d.allow_registration;
  document.getElementById('auth-new-users').checked = d.allow_new_users !== false;
}

async function saveAuthSettings() {
  const body = {
    allow_account_login: document.getElementById('auth-account-login').checked,
    allow_linux_do_login: document.getElementById('auth-linux-login').checked,
    allow_registration: document.getElementById('auth-registration').checked,
    allow_new_users: document.getElementById('auth-new-users').checked
  };
  const d = await api('/api/admin/auth-settings', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  if(d) toast('认证策略已保存');
}

async function createAccountUser() {
  const username = document.getElementById('new-user-username').value.trim();
  const name = document.getElementById('new-user-name').value.trim();
  const password = document.getElementById('new-user-password').value;
  const can_use_relay = document.getElementById('new-user-relay').checked;
  if(!username) return toast('请输入用户名');
  if(!password || password.length < 8) return toast('密码至少 8 位');
  const d = await api('/api/admin/users', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username, name, password, can_use_relay })
  });
  if(d && !d.error) {
    document.getElementById('new-user-username').value = '';
    document.getElementById('new-user-name').value = '';
    document.getElementById('new-user-password').value = '';
    document.getElementById('new-user-relay').checked = false;
    toast('账号已创建');
    loadUsers();
  }
}

function updateQualityStats() {
  const checked = allProxies.filter(p => p.quality).length;
  const chatgpt = allProxies.filter(p => p.quality && p.quality.chatgpt).length;
  const google = allProxies.filter(p => p.quality && p.quality.google).length;
  const residential = allProxies.filter(p => p.quality && p.quality.is_residential).length;
  document.getElementById('s-quality').textContent = checked;
  document.getElementById('s-chatgpt').textContent = chatgpt;
  document.getElementById('s-google').textContent = google;
  document.getElementById('s-residential').textContent = residential;
}

async function loadUsers() {
  const d = await api('/api/admin/users');
  if(!d) return;
  document.getElementById('s-users').textContent = d.total ?? 0;
  const tb = document.getElementById('user-table');
  const empty = document.getElementById('user-empty');
  document.getElementById('user-count').textContent = d.total ? `(${d.total})` : '';
  if(!d.users||!d.users.length) { tb.innerHTML=''; empty.style.display=''; return; }
  empty.style.display='none';
  tb.innerHTML = d.users.map(u => {
    const statusBadge = u.is_banned
      ? '<span class="badge badge-banned">已封禁</span>'
      : '<span class="badge badge-active">正常</span>';
    const actions = u.is_banned
      ? `<button class="btn btn-success btn-sm" onclick="unbanUser('${esc(u.id)}')">解封</button>`
      : `<button class="btn btn-warn btn-sm" onclick="banUser('${esc(u.id)}')">封禁</button>`;
    const relayBadge = u.can_use_relay
      ? '<span class="badge badge-active">允许</span>'
      : '<span class="badge badge-banned">禁止</span>';
    const relayAction = u.can_use_relay
      ? `<button class="btn btn-outline btn-sm" onclick="setRelayPermission('${esc(u.id)}', false)">禁用中转</button>`
      : `<button class="btn btn-success btn-sm" onclick="setRelayPermission('${esc(u.id)}', true)">允许中转</button>`;
    return `<tr>
      <td>${esc(u.id)}</td>
      <td>${esc(u.username)}</td>
      <td>${esc(u.name||'-')}</td>
      <td>${u.trust_level}</td>
      <td>${statusBadge}</td>
      <td>${relayBadge}</td>
      <td class="api-key-cell" title="${esc(u.api_key)}">${esc(u.api_key)}</td>
      <td>${new Date(u.created_at).toLocaleString()}</td>
      <td class="btn-group">
        ${relayAction}
        ${actions}
        <button class="btn btn-danger btn-sm" onclick="deleteUser('${esc(u.id)}')">删除</button>
      </td>
    </tr>`;
  }).join('');
}

async function deleteUser(id) {
  if(!confirm('确定删除该用户？该操作不可撤销。')) return;
  await api('/api/admin/users/'+id, {method:'DELETE'});
  toast('用户已删除');
  loadUsers();
}

async function banUser(id) {
  if(!confirm('确定封禁该用户？用户将被强制下线。')) return;
  await api('/api/admin/users/'+id+'/ban', {method:'POST'});
  toast('用户已封禁');
  loadUsers();
}

async function unbanUser(id) {
  await api('/api/admin/users/'+id+'/unban', {method:'POST'});
  toast('用户已解封');
  loadUsers();
}

async function setRelayPermission(id, allowed) {
  const d = await api('/api/admin/users/'+id+'/relay', {
    method:'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ allowed })
  });
  if(d) toast(allowed ? '已允许用户使用中转' : '已禁止用户使用中转');
  loadUsers();
}

async function loadSubscriptions() {
  const d = await api('/api/subscriptions');
  if(!d) return;
  const tb = document.getElementById('sub-table');
  const empty = document.getElementById('sub-empty');
  if(!d.subscriptions||!d.subscriptions.length) { tb.innerHTML=''; empty.style.display=''; return; }
  empty.style.display='none';
  tb.innerHTML = d.subscriptions.map(s=>`<tr>
    <td>${esc(s.name)}</td>
    <td><span class="badge badge-type">${esc(s.sub_type)}</span></td>
    <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis">${esc(s.url||'(内容)')}</td>
    <td>${s.proxy_count}</td>
    <td>${new Date(s.created_at).toLocaleString()}</td>
    <td class="btn-group">
      <button class="btn btn-primary btn-sm" onclick="refreshSub('${s.id}')">刷新</button>
      <button class="btn btn-danger btn-sm" onclick="deleteSub('${s.id}')">删除</button>
    </td>
  </tr>`).join('');
}

async function adminAddSubscription() {
  const name = document.getElementById('add-sub-name').value.trim();
  const subType = document.getElementById('add-sub-type').value;
  const url = document.getElementById('add-sub-url').value.trim();
  const content = document.getElementById('add-sub-content').value.trim();
  if (!name) return toast('请输入名称');
  if (!url && !content) return toast('请输入 URL 或粘贴内容');
  const body = { name, type: subType };
  if (url) body.url = url;
  else body.content = content;
  toast('正在添加订阅...');
  const d = await api('/api/subscriptions', {
    method: 'POST',
    headers: { ...authHeaders(), 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  if (d && d.subscription) {
    toast(`已添加 ${d.proxies_added} 个代理`);
    document.getElementById('add-sub-name').value = '';
    document.getElementById('add-sub-type').value = 'auto';
    document.getElementById('add-sub-url').value = '';
    document.getElementById('add-sub-content').value = '';
    refresh();
  } else if (d && d.error) {
    toast('错误: ' + d.error);
  }
}

async function loadProxies() {
  const params = new URLSearchParams({
    page: String(currentPage),
    per_page: String(pageSize),
    sort: sortField,
    dir: sortDir
  });
  const search = document.getElementById('f-search').value.trim();
  const status = document.getElementById('f-status').value;
  const type_ = document.getElementById('f-type').value;
  const quality = document.getElementById('f-quality').value;
  if(search) params.set('search', search);
  if(status) params.set('status', status);
  if(type_) params.set('type', type_);
  if(quality) params.set('quality', quality);
  const d = await api('/api/admin/proxies?' + params.toString());
  if(!d) return;
  allProxies = d.proxies||[];
  proxyTotal = d.total || 0;
  renderProxies();
}

function renderProxies() {
  const totalPages = Math.max(1, Math.ceil(proxyTotal / pageSize));
  if(currentPage > totalPages) currentPage = totalPages;

  document.getElementById('proxy-count').textContent = `(${proxyTotal})`;
  const tb = document.getElementById('proxy-table');
  const empty = document.getElementById('proxy-empty');
  if(!allProxies.length) { tb.innerHTML=''; empty.style.display=''; renderPagination(0, 0); return; }
  empty.style.display='none';

  tb.innerHTML = allProxies.map(p => {
    const q = p.quality;
    const yes = '<span class="badge badge-valid">Yes</span>';
    const no = '<span class="badge badge-invalid">No</span>';
    const na = '<span class="badge" style="background:rgba(148,163,184,.1);color:var(--text-dim)">-</span>';
    let riskBadge = na;
    if(q && q.risk_level && q.risk_level!=='Unknown') {
      const cls = q.risk_score<0.25?'badge-risk-low':q.risk_score<0.5?'badge-risk-med':'badge-risk-high';
      riskBadge = `<span class="badge ${cls}">${q.risk_level} ${(q.risk_score*100).toFixed(0)}%</span>`;
    }
    return `<tr>
      <td>${esc(p.name)}</td>
      <td><span class="badge badge-type">${esc(p.type)}</span></td>
      <td>${esc(p.server)}:${p.port}</td>
      <td>${p.status==='valid'?'<span class="badge badge-valid">有效</span>':p.status==='untested'?'<span class="badge badge-untested">待检测</span>':'<span class="badge badge-invalid">无效</span>'}</td>
      <td>${p.error_count}</td>
      <td>${p.local_port||'-'}</td>
      <td>${q&&q.ip_address?esc(q.ip_address):'-'}</td>
      <td>${q&&q.country?esc(q.country):'-'}</td>
      <td>${q&&q.ip_type?esc(q.ip_type):'-'}</td>
      <td>${riskBadge}</td>
      <td>${q?(q.chatgpt?yes:no):na}</td>
      <td>${q?(q.google?yes:no):na}</td>
      <td>${q?(q.is_residential?yes:no):na}</td>
      <td><button class="btn btn-danger btn-sm" onclick="deleteProxy('${p.id}')">删除</button></td>
    </tr>`;
  }).join('');

  renderPagination(proxyTotal, totalPages);
}

function renderPagination(total, totalPages) {
  const container = document.getElementById('proxy-pagination');
  if(totalPages <= 1) { container.innerHTML=''; return; }
  let html = '';
  html += `<button ${currentPage<=1?'disabled':''} onclick="goPage(1)">&laquo;</button>`;
  html += `<button ${currentPage<=1?'disabled':''} onclick="goPage(${currentPage-1})">&lsaquo;</button>`;
  const maxVisible = 7;
  let startPage = Math.max(1, currentPage - Math.floor(maxVisible/2));
  let endPage = Math.min(totalPages, startPage + maxVisible - 1);
  if(endPage - startPage < maxVisible - 1) startPage = Math.max(1, endPage - maxVisible + 1);
  if(startPage > 1) html += `<span class="page-info">...</span>`;
  for(let i = startPage; i <= endPage; i++) {
    html += `<button class="${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
  }
  if(endPage < totalPages) html += `<span class="page-info">...</span>`;
  html += `<button ${currentPage>=totalPages?'disabled':''} onclick="goPage(${currentPage+1})">&rsaquo;</button>`;
  html += `<button ${currentPage>=totalPages?'disabled':''} onclick="goPage(${totalPages})">&raquo;</button>`;
  html += `<span class="page-info">${(currentPage-1)*pageSize+1}-${Math.min(currentPage*pageSize,total)} / ${total}</span>`;
  container.innerHTML = html;
}

function goPage(page) { currentPage = page; loadProxies(); }

function sortBy(field) {
  if(sortField===field) sortDir = sortDir==='asc'?'desc':'asc';
  else { sortField=field; sortDir='asc'; }
  currentPage = 1;
  loadProxies();
}

function applyProxyFilters() {
  currentPage = 1;
  clearTimeout(filterTimer);
  filterTimer = setTimeout(loadProxies, 200);
}

async function deleteProxy(id) {
  if(!confirm('确定删除该代理？')) return;
  const d = await api('/api/admin/proxies/'+id, {method:'DELETE'});
  if(d && d.error) { toast('删除失败: '+d.error); return; }
  if(!d) return;
  toast('代理已删除');
  refresh();
}

async function deleteSub(id) {
  if(!confirm('确定删除该订阅源及其所有代理？')) return;
  const d = await api('/api/subscriptions/'+id, {method:'DELETE'});
  if(d && d.error) { toast('删除失败: '+d.error); return; }
  if(!d) return;
  toast('订阅源已删除');
  refresh();
}

async function refreshSub(id) {
  toast('正在刷新...');
  const d = await api('/api/subscriptions/'+id+'/refresh', {method:'POST'});
  if(d) toast('刷新完成: 新增 '+d.proxies_added+' 个代理');
  refresh();
}

async function triggerValidation() {
  toast('正在启动验证...');
  await api('/api/admin/validate', {method:'POST'});
}

async function triggerQualityCheck() {
  toast('正在启动质量检测...');
  await api('/api/admin/quality-check', {method:'POST'});
}

async function cleanupProxies() {
  if(!confirm('确定清理所有超过错误阈值的代理？')) return;
  const d = await api('/api/admin/proxies/cleanup', {method:'POST'});
  if(d) toast(d.message);
  refresh();
}

async function cleanupUselessProxies() {
  const targets = allProxies.filter(p => p.quality && !p.quality.chatgpt && !p.quality.google && !p.quality.is_residential);
  if(targets.length === 0) { toast('没有三不通代理'); return; }
  if(!confirm('确定删除 ' + targets.length + ' 个三不通代理（ChatGPT/Google/住宅均为 No）？')) return;
  let deleted = 0;
  for(const p of targets) {
    const d = await api('/api/admin/proxies/'+p.id, {method:'DELETE'});
    if(d && !d.error) deleted++;
  }
  toast('已删除 ' + deleted + ' 个三不通代理');
  refresh();
}

function refresh() { loadStats(); loadAuthSettings(); loadUsers(); loadSubscriptions(); loadProxies(); }

// Init: check auth
checkAuth();
</script>
